# Observability stack as code (story 13.02): Prometheus scrapes the app's /prometheus endpoint
# (story 13.01) and Grafana renders the ops dashboard, both provisioned from the files in this
# directory so the whole thing reproduces in a clean environment with no manual clicking.
#
#   1. Run the app on :8080            (PORT=8080 java -jar build/libs/living-antispam-*.jar)
#   2. docker compose -f ops/docker-compose.observability.yml up
#   3. Grafana → http://localhost:3001 (anonymous viewer; dashboard "Living Anti-Spam — Ops")
#      Prometheus → http://localhost:9090
#
# Kept separate from the repo-root docker-compose.yml (dev Postgres/Redis) so the ops stack is an
# opt-in, independent concern.
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      # Lets the container reach an app running on the host (Linux; Docker Desktop maps it natively).
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      - prometheus
    environment:
      # Demo-grade access: anonymous viewer so the dashboard opens with no login. Admin stays
      # behind a password for edits. Never these values in a real multi-tenant deploy.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 10
