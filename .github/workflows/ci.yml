name: CI

# Build + test on every push and PR; on a green main build, trigger the hosted
# deploy. This is the gate that backs the "push to main → deploys to the hosted
# URL" acceptance criterion.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so bootBuildInfo can stamp the commit

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew --no-daemon clean test bootJar

      - name: Upload bootJar
        uses: actions/upload-artifact@v4
        with:
          name: living-antispam-jar
          path: build/libs/*.jar

  console:
    name: Console build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Unit tests + production build
        run: |
          npm test
          npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E (route-stubbed)
        run: npm run e2e

  deploy:
    name: Deploy API + live smoke test
    needs: [build-test, console]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Render's autoDeploy is off, so this hook is the deploy trigger — and it
      # only runs after build-test + console are green. Needs RENDER_DEPLOY_HOOK_URL
      # (secret) + LIVE_API_URL (variable); the job no-ops if either is unset.
      #
      # "Is the new build live?" is detected via /info's build.time, NOT the commit:
      # Render's build context has no .git, so /info's commit is always "unknown",
      # but build.time changes on every rebuild — a reliable version marker that
      # needs no Render API key.
      - name: Deploy to Render + smoke-test the live API
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          API: ${{ vars.LIVE_API_URL }}
        run: |
          if [ -z "$HOOK" ] || [ -z "$API" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret or LIVE_API_URL variable not set — skipping deploy + smoke."
            exit 0
          fi
          API="${API%/}"

          before="$(curl -fsS --max-time 15 "$API/info" 2>/dev/null | jq -r '.build.time // empty')"
          echo "current live build.time: ${before:-<none/unreachable>}"

          echo "Triggering Render deploy…"
          curl -fsS -X POST "$HOOK" >/dev/null
          echo "Triggered. Waiting for the new build to go live (Render rebuilds + cold start can take several minutes)…"

          live=""
          for i in $(seq 1 80); do
            now="$(curl -fsS --max-time 15 "$API/info" 2>/dev/null | jq -r '.build.time // empty')"
            echo "  [$i] live build.time: ${now:-<unreachable>}"
            if [ -n "$now" ] && [ "$now" != "$before" ]; then live=1; break; fi
            sleep 15
          done
          if [ -z "$live" ]; then
            echo "::error::New build did not go live within ~20 min."
            exit 1
          fi

          echo "New build is live. Asserting health…"
          curl -fsS --max-time 15 "$API/health" | grep -q '"status":"UP"' \
            || { echo "::error::/health not UP"; exit 1; }

          echo "Asserting a denylisted-URL email is blocked…"
          resp="$(curl -fsS --max-time 20 -X POST "$API/analyze" \
            -H 'Content-Type: application/json' \
            -d '{"raw":"From: deals@promo.example\nSubject: Act now\n\nVerify your prize at http://malware.example/login today.\n","source":"ci-smoke"}')"
          echo "  /analyze -> $resp"
          echo "$resp" | grep -q '"tier":"block"' \
            || { echo "::error::live /analyze did not return tier=block"; exit 1; }
          echo "✅ Live smoke test passed: the new build is serving and deciding correctly."
