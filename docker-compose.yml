# Local managed-service dependencies for development. Currently just Postgres
# (story 01.02); Redis and Kafka will be added as their stories land.
#   docker compose up -d db
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: antispam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d antispam"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
