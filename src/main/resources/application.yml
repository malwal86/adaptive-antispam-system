spring:
  application:
    name: living-antispam

  # The JDBC datasource reuses the single APP_POSTGRES_URL contract from story
  # 01.01 (relaxed-bound as app.postgres-url) so there is one place the Postgres
  # location is configured. Credentials come from their own env vars.
  datasource:
    url: ${app.postgres-url:}
    username: ${APP_POSTGRES_USER:}
    password: ${APP_POSTGRES_PASSWORD:}
    # Supabase fronts Postgres with the Supavisor pooler. On the IPv4 SESSION-mode
    # pooler (...pooler.supabase.com:5432) every client connection holds a server
    # connection for its whole life, and the TOTAL clients across everything talking
    # to the project is capped at the project's pool_size (15 by default) — exceed it
    # and boot dies with FATAL (EMAXCONNSESSION). So bound this app's demand well under
    # that ceiling: a tight maximum-pool-size leaves headroom for Flyway, a second
    # instance during a deploy, and any local session, and stops a crash-loop from
    # piling up leaked session slots. The TRANSACTION-mode pooler (:6543) lifts the cap
    # and returns the server connection per-transaction (the durable fix — repoint
    # APP_POSTGRES_URL there); prepareThreshold=0 turns off server-side prepared
    # statements, which transaction mode can't keep across pooled connections (a no-op
    # on session mode / a direct connection, so it is always safe to set).
    hikari:
      maximum-pool-size: ${APP_DB_POOL_MAX:5}
      minimum-idle: 1
      data-source-properties:
        prepareThreshold: 0

  # Flyway owns the schema, including the emails-immutability trigger.
  flyway:
    enabled: true

  # Redis is the materialized reputation read cache (story 03.04), in front of the
  # Postgres reputation_events source of truth. The connection reuses a single
  # APP_REDIS_URL contract (Upstash gives a rediss:// URL with TLS); empty when no
  # Redis is configured. The cache is only consulted when antispam.reputation.cache
  # is enabled, and it degrades to Postgres on any Redis error, so an unset/empty URL
  # locally is harmless.
  data:
    redis:
      url: ${APP_REDIS_URL:}

  # LLM fallback provider (story 05.02). Spring AI's OpenAI auto-configuration builds the
  # ChatModel the SpringAiLlmChatPort wraps; the model name is config, not code, so the
  # provider/model is a swap-only demo feature (PRD §Subsystem 5).
  #
  # The OpenAI chat auto-config is on by default (matchIfMissing) and eagerly builds the
  # model bean, which ASSERTS a non-blank api key at startup. So the key defaults to a
  # non-blank placeholder, not empty: the bean constructs and the context boots with no real
  # key (local, CI, a keyless deploy), and a routed decision only ever calls the provider when
  # antispam.llm.enabled=true — which the hosted deploy sets together with a real OPENAI_API_KEY.
  # With the placeholder key and the flag off, no call is ever made; with the flag on but the
  # key still the placeholder, the call 401s and the decision fail-degrades (never crashes).
  #
  # Only chat is used. The other OpenAI models (embedding, image, moderation, audio) are also
  # on-by-default and would each eagerly assert the key, so they are switched off — embeddings
  # here are the project's own ONNX model (story 04.03), not OpenAI's.
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:placeholder-no-llm-key}
      chat:
        options:
          model: ${ANTISPAM_LLM_MODEL:gpt-4o-mini}
    model:
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none

  # Kafka producer for the event spine (story 02.01). Broker location reuses the
  # single APP_KAFKA_BOOTSTRAP_SERVERS contract (relaxed-bound as
  # app.kafka-bootstrap-servers) so there is one place it is configured.
  # Durability: acks=all + the idempotent producer mean a transient broker hiccup
  # is retried internally without duplicating or losing the record. max.block.ms
  # bounds how long a send may wait on an unhealthy broker so ingest stays
  # responsive (the email is already persisted; the publish is after-commit).
  kafka:
    bootstrap-servers: ${app.kafka-bootstrap-servers:}
    # Broker auth + transport. Set at the top level so it propagates to the
    # producer, the consumers, AND the AdminClient that creates topics. Defaults
    # are PLAINTEXT with empty SASL/SSL: local dev, the test profile, and the
    # Testcontainers spine all run against an unauthenticated broker, so an unset
    # environment never engages SASL/SSL (Kafka ignores sasl.*/ssl.* under
    # PLAINTEXT). The hosted deploy talks to a managed broker (Aiven) over
    # SASL_SSL and opts in via the environment:
    #   APP_KAFKA_SECURITY_PROTOCOL=SASL_SSL
    #   APP_KAFKA_SASL_MECHANISM=SCRAM-SHA-256   # PLAIN for some providers
    #   APP_KAFKA_SASL_JAAS_CONFIG=<the provider's full JAAS line, incl. creds>
    # Aiven signs its broker cert with a per-project private CA, so the client
    # must be told to trust it. Rather than mount a JKS file, pass the CA PEM
    # inline (Kafka 2.7+ supports an in-memory PEM truststore):
    #   APP_KAFKA_SSL_TRUSTSTORE_TYPE=PEM
    #   APP_KAFKA_SSL_TRUSTSTORE_CERTIFICATES=<the Aiven Project CA, PEM>
    security:
      protocol: ${APP_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
    properties:
      sasl.mechanism: ${APP_KAFKA_SASL_MECHANISM:}
      sasl.jaas.config: ${APP_KAFKA_SASL_JAAS_CONFIG:}
      ssl.truststore.type: ${APP_KAFKA_SSL_TRUSTSTORE_TYPE:}
      ssl.truststore.certificates: ${APP_KAFKA_SSL_TRUSTSTORE_CERTIFICATES:}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        max.block.ms: 10000
    # Consumer for the feature extractor (story 02.02). Values are JSON
    # RawEmailEvents; the ErrorHandlingDeserializer wraps the JSON deserializer so a
    # single un-deserializable record is logged and skipped rather than poisoning
    # the partition. earliest so a fresh consumer group processes the backlog.
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      auto-offset-reset: earliest
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.antispam.event.RawEmailEvent
        spring.json.trusted.packages: com.antispam.event

# Bind to the port the host injects (Render/Railway/Fly all set PORT); default
# 8080 for local runs.
server:
  port: ${PORT:8080}

# Actuator is remapped to the application root so the public probes are /health
# and /info (not /actuator/*). /health is the liveness probe; /info reports the
# build version + git commit so any deployed build is identifiable.
management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info
  # The reputation cache degrades to Postgres when Redis is down (story 03.04), so a
  # Redis outage must NOT mark the app unhealthy and pull it from the load balancer.
  # Exclude Redis from the health aggregate to keep liveness independent of the cache.
  health:
    redis:
      enabled: false
  info:
    build:
      enabled: true
    git:
      enabled: false

# Corpus seeding (story 01.03). Disabled by default so a normal boot never loads
# the corpus; `make seed` flips antispam.seed.enabled=true and points corpus-dir
# at a <dataset>/<class>/<file> tree. Default dir is the vendored sample so an
# offline `make seed` works out of the box.

# Hard-rule data (story 01.04). Denylists and the brand list are metadata, not
# code, so the policy can change without a redeploy. These are illustrative demo
# defaults; real denylists / phish feeds load through the seed path (story 01.03)
# and operational tuning later. A host matches the denylist when it equals an
# entry or is a subdomain of it.
# Event-spine topology (story 02.01), bound by KafkaTopicProperties. Distinct
# from app.kafka-bootstrap-servers (the broker location): this is the emails.raw
# topic shape and the publish on/off switch. `enabled: false` (set in the test
# profile, or anywhere without a broker) swaps in a no-op publisher so ingest runs
# without Kafka. Partitions bound the per-sender consumer parallelism; retention
# is the spine's replay window (Postgres remains the source of truth). On a
# single-broker local/test cluster, override replication-factor to 1.
app:
  kafka:
    enabled: true
    raw-topic:
      name: emails.raw
      partitions: 6
      # Replicas per partition. Defaults to 3 (a multi-broker managed cluster), but
      # a single-broker plan/cluster can't replicate x3 and would reject topic
      # creation — override APP_KAFKA_REPLICATION_FACTOR=1 there (local/test set 1
      # via their own profiles).
      replication-factor: ${APP_KAFKA_REPLICATION_FACTOR:3}
      retention: 7d
    # Per-sender reputation accrual consumer (story 03.05). A second, independent
    # consumer group on emails.raw, parallel to the feature extractor. Because the
    # topic is keyed by sender, each partition is one sender-shard owned by exactly
    # one consumer thread — that assignment IS the per-sender serialization, so
    # accrual needs no application lock. concurrency defaults to the partition count
    # so every shard can run on its own thread; any value up to partitions preserves
    # per-partition ordering. Accepted demo-scale tradeoff: a hot sender's burst all
    # lands on one partition (skew), surfaced by the antispam.reputation.accrual
    # partition-skew metric — a throughput imbalance, never a correctness loss.
    reputation-consumer:
      group-id: reputation-accrual
      concurrency: 6

antispam:
  # The analyzer/console (story 01.05, Epic 12) is a separate Next.js service that
  # calls this API cross-origin. Allow its origin(s) here; default is the local
  # Next.js dev server. In a real deployment set the hosted console origin(s) via
  # ANTISPAM_CONSOLE_ALLOWED_ORIGINS (comma-separated) — never a wildcard.
  console:
    allowed-origins:
      - http://localhost:3000
  # Beta-reputation parameters (stories 03.01, 03.02). reputation =
  # (good+alpha)/(good+bad+alpha+beta); alpha/beta are pseudo-counts of prior good/bad
  # observations. 1/1 is a uniform prior, so a brand-new sender starts at mean 0.5 with
  # maximum variance — the wide uncertainty that routes unseen senders to the LLM
  # (Epic 05). half-life is the exponential read-time decay half-life (PRD §Subsystem 3):
  # evidence older than one half-life counts for under half, so dormant trust fades and
  # a warm-then-attack sender isn't fully shielded by old goodwill. Tunable here (not in
  # code) and validated (a proper Beta needs alpha, beta > 0; half-life must be positive).
  reputation:
    alpha: 1.0
    beta: 1.0
    half-life: 7d
    # Redis materialized read cache (story 03.04). Off by default so local/dev and the
    # existing Postgres-only tests serve reputation straight from the event log; the
    # hosted deploy sets ANTISPAM_REPUTATION_CACHE_ENABLED=true with APP_REDIS_URL.
    # When on, reads are served from Redis and rebuilt from Postgres on a miss; when
    # Redis is unavailable the read transparently falls back to Postgres.
    cache:
      enabled: ${ANTISPAM_REPUTATION_CACHE_ENABLED:false}
  # Runtime burst override (story 06.01). The velocity half of the warm-then-attack defence
  # (time decay, Epic 03, is the other half): each email records a hit in a per-sender Redis
  # sliding window, and when a sender's count within the window exceeds the active policy's
  # burst_threshold the decision is escalated regardless of posterior (PRD §Subsystem 1 step 4,
  # §Subsystem 4). The *threshold* is on the policy (versioned, comparable per regime); window and
  # escalate-to are the detector mechanism here. Off by default so local/dev and the Postgres-only
  # tests wire the no-op NoBurstOverride and never dial Redis; the hosted deploy sets
  # ANTISPAM_BURST_ENABLED=true with APP_REDIS_URL. On a Redis outage the detector degrades OPEN
  # (treats it as no burst) — unlike the budget, which fails closed — since failing closed would
  # mass-escalate legitimate mail. Window and escalate-to are tunable here without a redeploy.
  burst:
    enabled: ${ANTISPAM_BURST_ENABLED:false}
    window: ${ANTISPAM_BURST_WINDOW:60s}
    escalate-to: ${ANTISPAM_BURST_ESCALATE_TO:QUARANTINE}
    # SimHash near-duplicate radius (story 06.02): the cheap surface tier that catches templated
    # blasts spread across senders. Two content fingerprints within this many bits are near-dups;
    # a cluster of them exceeding burst_threshold escalates (reworded variants that defeat this are
    # the offline embedding tier's job, 06.03). 6 separates trivial template variation (~few bits)
    # from unrelated mail (~32 bits). Tunable here without a redeploy.
    near-dup-hamming-threshold: ${ANTISPAM_BURST_NEAR_DUP_HAMMING:6}
  # Offline embedding campaign clustering (story 06.03): the expensive, semantic tier that catches
  # *reworded* variants the cheap surface tier (06.02 SimHash) misses. An out-of-band job clusters
  # the stored email embeddings (04.03, pgvector) into campaign_clusters by cosine similarity — it
  # reads embeddings and writes clusters only, never the live decision path. similarity-threshold is
  # the one knob: emails at or above this cosine are the same campaign. 0.80 sits in the gap the
  # embedding benchmark measured (reworded same-topic ~0.85-0.94, unrelated well under 0.5), so it
  # co-clusters reworded variants while keeping distinct campaigns apart. Tunable here without a
  # redeploy.
  campaign-clustering:
    similarity-threshold: ${ANTISPAM_CAMPAIGN_SIMILARITY_THRESHOLD:0.80}
  # LLM fallback (story 05.02). The uncertain ~5% the router escalates (05.01) is sent to
  # Spring AI's ChatClient for a strictly-typed verdict. Off by default so local dev and
  # the full-context tests never reach a provider — a routed decision then fail-degrades on
  # the fast-path posterior. The hosted deploy sets ANTISPAM_LLM_ENABLED=true with an
  # OPENAI_API_KEY. cost.*-per-1k-tokens price the call so llm_cost_usd is recorded per
  # classification (the rolling budget cap that consumes it is story 05.04); the defaults
  # are illustrative GPT-4o-mini-class rates, tunable here without a redeploy.
  llm:
    enabled: ${ANTISPAM_LLM_ENABLED:false}
    cost:
      input-per-1k-tokens: 0.00015
      output-per-1k-tokens: 0.00060
    # Rolling budget cap (story 05.04). LLM spend is tracked in atomic Redis counters — one per
    # UTC day, one per UTC month — and every call reserves against both before it runs, so a
    # bad/adversarial day can't burn the month and cost is bounded by design (PRD §Cost). Off by
    # default: local dev and the full-context tests wire the no-op UnboundedLlmBudget, so no call
    # dials Redis to check a budget. The hosted deploy sets ANTISPAM_LLM_BUDGET_ENABLED=true with
    # APP_REDIS_URL (and, on a real Redis outage, the gate fails CLOSED — denying calls — since
    # there is no second source of truth for spend). Caps and the per-call reservation are tunable
    # here without a redeploy; the reservation is a conservative upper bound on one call (incl. its
    # retry), charged up front and trued up to the real cost afterwards.
    budget:
      enabled: ${ANTISPAM_LLM_BUDGET_ENABLED:false}
      daily-cap-usd: ${ANTISPAM_LLM_BUDGET_DAILY_USD:0.50}
      monthly-cap-usd: ${ANTISPAM_LLM_BUDGET_MONTHLY_USD:5.00}
      per-call-reservation-usd: ${ANTISPAM_LLM_BUDGET_RESERVATION_USD:0.01}
    # Quarantine-pending SLA (story 05.06). When the LLM is enabled, uncertain mail is withheld
    # (quarantine-pending) synchronously and resolved asynchronously within this deadline —
    # promote-to-inbox, confirm-spam, or fail-degrade past it (PRD §Live timing: ~30s SLA). With
    # the LLM disabled there is no async path, so this is unused. Tunable without a redeploy.
    quarantine:
      sla: ${ANTISPAM_LLM_SLA:30s}
  seed:
    enabled: false
    corpus-dir: seed-corpus
  # Bootstrap train/eval split over the labeled corpus (stories 11.01 / 11.03). The
  # split is grouped by family (sender domain, as a campaign/lineage proxy) and
  # time-forward (latest families held out), so calibration (04.02) and export (10.01)
  # don't leak. eval-fraction is the share held out; seed only breaks ties among
  # families of identical recency. Tunable here (not in code) and recorded so the same
  # corpus + (eval-fraction, seed) reproduces the split exactly.
  eval-split:
    eval-fraction: 0.2
    seed: 42
  # Probability calibration of the served model (story 04.02). The calibrator is fit on
  # the split's train side and its reliability measured on the held-out eval side, so the
  # measurement never leaks. max-ece is the gate: a model whose calibrated ECE exceeds it
  # is rejected and never installed on the serving path — fusing an un-calibratable score
  # with reputation (04.04) would be meaningless. bins sets the reliability-diagram
  # resolution; min-samples-per-side refuses a run when either side is too small to trust.
  calibration:
    max-ece: 0.10
    bins: 10
    min-samples-per-side: 50
  hard-rules:
    url-denylist:
      - malware.example
      - phishing.example
      - baddomain.test
    high-value-brands:
      - name: paypal
        domain: paypal.com
      - name: microsoft
        domain: microsoft.com
      - name: apple
        domain: apple.com

# Required managed-service coordinates (Postgres / Redis / Kafka) are NOT
# defaulted here on purpose: in any real environment they must be supplied via
# APP_POSTGRES_URL / APP_REDIS_URL / APP_KAFKA_BOOTSTRAP_SERVERS. A missing
# value fails startup loudly (see RequiredServicesProperties). For local dev,
# activate the `local` profile, which supplies placeholders.
