# Render blueprint — the Java API only. The Next.js console deploys separately on
# Vercel (see DEPLOYMENT.md), so it is intentionally not a service here.
#
# autoDeploy is OFF: deploys are gated by CI. A green build on `main` triggers this
# service's deploy hook (.github/workflows/ci.yml), so a red build never ships.
# Secrets/URLs are `sync: false` — set the real values in the Render dashboard.
services:
  - type: web
    name: living-antispam
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    autoDeploy: false
    healthCheckPath: /health
    envVars:
      # --- Postgres (Supabase): the source-of-truth store. Set the real values. ---
      - key: APP_POSTGRES_URL
        sync: false # jdbc:postgresql://db.<ref>.supabase.co:5432/postgres
      - key: APP_POSTGRES_USER
        sync: false
      - key: APP_POSTGRES_PASSWORD
        sync: false
      # --- Redis: validated-present; the reputation cache stays off unless
      #     ANTISPAM_REPUTATION_CACHE_ENABLED=true, so a placeholder is harmless. ---
      - key: APP_REDIS_URL
        value: redis://placeholder:6379
      # --- Kafka (Aiven): the event spine is live (Epics 02/03), so the consumers
      #     dial out at startup and a placeholder no longer resolves. Point these at
      #     the real managed broker. BOOTSTRAP_SERVERS is the host:port; the SASL
      #     trio is how the broker authenticates us (set protocol/mechanism per the
      #     provider, e.g. SASL_SSL + PLAIN for Confluent, SASL_SSL + SCRAM-SHA-256
      #     for Aiven). JAAS_CONFIG carries the credentials, so it is a secret. ---
      - key: APP_KAFKA_BOOTSTRAP_SERVERS
        sync: false # <broker>-<project>.aivencloud.com:<port>
      - key: APP_KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: APP_KAFKA_SASL_MECHANISM
        sync: false # PLAIN | SCRAM-SHA-256 | SCRAM-SHA-512
      - key: APP_KAFKA_SASL_JAAS_CONFIG
        sync: false # full JAAS line incl. username/password — secret
      # Aiven's broker cert is signed by a private project CA, so the client must
      # trust it. Pass the CA inline as PEM (no JKS file to mount).
      - key: APP_KAFKA_SSL_TRUSTSTORE_TYPE
        value: PEM
      - key: APP_KAFKA_SSL_TRUSTSTORE_CERTIFICATES
        sync: false # the Aiven Project CA, full PEM incl. BEGIN/END lines
      # Match the broker count of your plan: a single-broker cluster can't replicate
      # x3, so set this to 1 there. Unset => app default of 3 (multi-broker plan).
      - key: APP_KAFKA_REPLICATION_FACTOR
        sync: false # 1 for a single-broker plan; omit/3 for >=3 brokers
      # --- CORS allow-list = the console's Vercel origin(s). Comma-separated;
      #     patterns allowed, e.g. "https://*.vercel.app,https://<your-domain>". ---
      - key: ANTISPAM_CONSOLE_ALLOWED_ORIGINS
        sync: false
      # --- OpenAI LLM fallback (stories 05.01/05.02). The uncertain ~5% the router
      #     escalates is sent to Spring AI's OpenAI ChatClient. ENABLED must be true
      #     for the call to happen (off => fail-degrade to the fast-path posterior);
      #     the API key is the secret, set its value in the dashboard. ---
      - key: ANTISPAM_LLM_ENABLED
        value: "true"
      - key: ANTISPAM_LLM_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false # sk-proj-... — set the real value in the Render dashboard
