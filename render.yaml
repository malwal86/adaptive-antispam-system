# Render blueprint — the Java API only. The Next.js console deploys separately on
# Vercel (see DEPLOYMENT.md), so it is intentionally not a service here.
#
# autoDeploy is OFF: deploys are gated by CI. A green build on `main` triggers this
# service's deploy hook (.github/workflows/ci.yml), so a red build never ships.
# Secrets/URLs are `sync: false` — set the real values in the Render dashboard.
services:
  - type: web
    name: living-antispam
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    autoDeploy: false
    healthCheckPath: /health
    envVars:
      # --- Postgres (Supabase): the source-of-truth store. Set the real values. ---
      - key: APP_POSTGRES_URL
        sync: false # jdbc:postgresql://db.<ref>.supabase.co:5432/postgres
      - key: APP_POSTGRES_USER
        sync: false
      - key: APP_POSTGRES_PASSWORD
        sync: false
      # --- Redis/Kafka are validated-present but not yet connected (their epics
      #     haven't landed). Placeholders satisfy the fail-fast check and let the
      #     app boot; swap for real coordinates when Epics 02/03 wire them up. ---
      - key: APP_REDIS_URL
        value: redis://placeholder:6379
      - key: APP_KAFKA_BOOTSTRAP_SERVERS
        value: placeholder:9092
      # --- CORS allow-list = the console's Vercel origin(s). Comma-separated;
      #     patterns allowed, e.g. "https://*.vercel.app,https://<your-domain>". ---
      - key: ANTISPAM_CONSOLE_ALLOWED_ORIGINS
        sync: false
